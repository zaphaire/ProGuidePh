<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 90" width="350" height="90">
  <defs>
    <linearGradient id="navyBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#243868;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c060;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Flag Icon Background -->
  <g transform="translate(10, 15)">
    <circle cx="30" cy="30" r="30" fill="url(#navyBlue)"/>
    <path d="M30,0 A30,30 0 0,0 30,60 A30,30 0 0,0 30,0 Z" fill="#fff" clip-path="url(#flagHalf)"/>
    <clipPath id="flagHalf"><path d="M30,0 A30,30 0 0,0 30,60 L30,0 Z"/></clipPath>
    
    <!-- White Triangle -->
    <path d="M30,8 L52,48 L8,48 Z" fill="#fff"/>
    
    <!-- Sun - Gold -->
    <g transform="translate(30, 48)">
      <circle cx="0" cy="-4" r="3" fill="url(#goldGrad)"/>
      <polygon points="0,-9 1.5,-14 -1.5,-14" fill="#e8a020" transform="rotate(0)"/>
      <polygon points="0,-9 1.5,-14 -1.5,-14" fill="#e8a020" transform="rotate(45)"/>
      <polygon points="0,-9 1.5,-14 -1.5,-14" fill="#e8a020" transform="rotate(90)"/>
      <polygon points="0,-9 1.5,-14 -1.5,-14" fill="#e8a020" transform="rotate(135)"/>
      <polygon points="0,-9 1.5,-14 -1.5,-14" fill="#e8a020" transform="rotate(180)"/>
      <polygon points="0,-9 1.5,-14 -1.5,-14" fill="#e8a020" transform="rotate(225)"/>
      <polygon points="0,-9 1.5,-14 -1.5,-14" fill="#e8a020" transform="rotate(270)"/>
      <polygon points="0,-9 1.5,-14 -1.5,-14" fill="#e8a020" transform="rotate(315)"/>
    </g>
    
    <!-- Stars -->
    <polygon points="30,18 30.7,21 34,21 31.2,23 32.5,26 30,24 27.5,26 28.8,23 26,21 29.3,21" fill="#e8a020"/>
    <polygon points="22,30 22.4,32 25,32 22.8,33.5 23.6,36 22,34.5 20.4,36 21.2,33.5 19,32 21.6,32" fill="#e8a020" transform="scale(0.8) translate(5,5)"/>
    <polygon points="38,30 38.4,32 41,32 38.8,33.5 39.6,36 38,34.5 36.4,36 37.2,33.5 35,32 37.6,32" fill="#e8a020" transform="scale(0.8) translate(-5,5)"/>
    
    <!-- Book overlay -->
    <path d="M22,25 L22,40 L38,40 L38,25 L35,28 L22,28 Z" fill="#fff" opacity="0.9"/>
    <path d="M22,25 L30,22 L30,25 L22,28 Z" fill="#e8a020"/>
    <path d="M30,22 L38,25 L35,28 L30,25 Z" fill="#f5c060"/>
    <line x1="30" y1="25" x2="30" y2="40" stroke="#1a2744" stroke-width="1.5"/>
  </g>
  
  <!-- ProGuidePh Text -->
  <text x="80" y="52" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="36" font-weight="800" fill="#1a2744">Pro</text>
  <text x="145" y="52" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="36" font-weight="800" fill="#e8a020">GuidePh</text>
  
  <!-- Tagline -->
  <text x="82" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="500" fill="#6b7280" letter-spacing="3">PRACTICAL TIPS FOR FILIPINOS</text>
</svg>